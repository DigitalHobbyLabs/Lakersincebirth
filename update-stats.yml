name: Update Lakers Stats

on:
  schedule:
    # Runs at 9am and 9pm UTC daily — adjust to taste.
    # NBA games usually finish by 3-4am UTC, so a morning run catches last night's game.
    - cron: "0 9,21 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  pull-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull regular season stats
        run: python3 laker_stat_pull.py --season 2026-27 --season-type "Regular Season" --out data/regular.json
        continue-on-error: true   # don't kill the job if NBA.com rate-limits one run

      - name: Pull playoff stats
        run: python3 laker_stat_pull.py --season 2026-27 --season-type "Playoffs" --out data/playoffs.json
        continue-on-error: true

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git diff --staged --quiet || git commit -m "Auto-update Lakers stats $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
